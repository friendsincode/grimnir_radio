{{define "pages/embed/player"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            font-size: 14px; line-height: 1.4;
            {{if eq (index .Data "Theme") "dark"}}
            background: #1a1a2e; color: #e4e4e7;
            {{else}}
            background: #ffffff; color: #27272a;
            {{end}}
        }
        .grimnir-player-mount {
            display: flex; align-items: center; gap: .6rem;
            padding: .6rem .75rem;
        }
        .grimnir-player-mount [data-grimnir-role="ui-root"] {
            display: flex; align-items: center; gap: .6rem; width: 100%;
        }
        .grimnir-player-mount [data-grimnir-role="toggle"] {
            padding: .3rem .8rem; border: 0; border-radius: .3rem;
            background: #4f46e5; color: #fff; cursor: pointer;
        }
        .grimnir-player-mount [data-grimnir-role="label"] { font-weight: 600; }
        .grimnir-player-mount [data-grimnir-role="quality"] {
            padding: .15rem .35rem; border: 1px solid currentColor;
            border-radius: .2rem; background: transparent; color: inherit;
        }
        .grimnir-player-mount [data-grimnir-role="status"] {
            opacity: .7; font-size: .85rem; flex: 1;
        }
        .grimnir-player-mount [data-grimnir-role="progress"] {
            width: 60px; height: 2px; border-radius: 2px;
        }
        .grimnir-player-mount[data-grimnir-reconnect-ui="progress"] [data-grimnir-role="progress"],
        .grimnir-player-mount[data-grimnir-reconnect-ui="text"] [data-grimnir-role="progress"] {
            background: linear-gradient(90deg, #4f46e5 0%, transparent 100%);
            animation: grimnir-progress 1.2s linear infinite;
        }
        @keyframes grimnir-progress { from { opacity: .3 } to { opacity: 1 } }
        .grimnir-player-mount [data-grimnir-role="retry"][data-grimnir-hidden="1"] { display: none; }
    </style>
</head>
<body>
    <div class="grimnir-player-mount"
         data-grimnir-player
         data-station-id="{{index .Data "StationID"}}"
         data-station-name="{{index .Data "StationName"}}"></div>
    <script type="module">
        import { createPlayer } from '/static/js/player/player.js';
        document.querySelectorAll('[data-grimnir-player]').forEach((el) => {
            const stationId = el.getAttribute('data-station-id');
            const stationName = el.getAttribute('data-station-name') || 'Grimnir Radio';
            if (!stationId) return;
            createPlayer(el, stationId, { stationName });
        });
    </script>
</body>
</html>
{{end}}
