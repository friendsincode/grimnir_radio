name: CI

on:
  push:
    branches: ["main", "v2-dev"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      CI: "1"
      TEST_DB_DSN: "host=localhost user=postgres password=postgres dbname=postgres sslmode=disable"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so migration-lint can resolve origin/<base_ref>...HEAD in PR mode.
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install GStreamer (required for edge encoder CGo build)
        run: |
          sudo apt-get update -qq
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y -qq \
            libgstreamer1.0-dev \
            gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good \
            gstreamer1.0-plugins-ugly \
            gstreamer1.0-plugins-bad \
            gstreamer1.0-tools
          gst-launch-1.0 --version
          gst-inspect-1.0 input-selector | head -3

      - name: Tidy (must be clean)
        run: |
          go mod tidy
          git diff --exit-code

      - name: gofmt (must be clean)
        run: |
          files="$(git ls-files '*.go')"
          unformatted="$(gofmt -l $files)"
          if [ -n "$unformatted" ]; then
            echo "Unformatted Go files:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: Migration lint (expand/contract discipline)
        run: |
          if [ -n "${{ github.base_ref }}" ]; then
            BASE_REF=origin/${{ github.base_ref }} make migration-lint-ci
          else
            make migration-lint
          fi

      - name: go test
        run: go test -count=1 ./...

      - name: Coverage report (80% target, non-blocking gate)
        run: |
          COVERAGE_MIN=80 COVERAGE_ENFORCE=0 make coverage

      - name: Upload coverage profile
        uses: actions/upload-artifact@v4
        with:
          name: coverage-profile
          path: coverage.out
