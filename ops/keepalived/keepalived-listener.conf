# keepalived configuration for the LISTENER-facing VIP.
#
# Holds <listener-vip> (listener VIP) on whichever HA node passes the
# `check_edge` health probe with the higher VRRP priority. When the holder's
# edge-encoder fails the probe, priority drops below the peer & the peer
# takes the VIP within ~3 seconds (3x VRRP advert_int of 1s).
#
# This file is the TEMPLATE shipped in-tree. Operators copy it to
# /etc/keepalived/conf.d/listener.conf on each node & fill in the per-node
# bits marked NODE-SPECIFIC: state, priority, unicast_src_ip, unicast_peer.
#
# Node A (<node-a-ip>): state MASTER, priority 110
# Node B (<node-b-ip>): state BACKUP, priority 100
#
# See docs/runbooks/keepalived-install.md for the full operator procedure.

vrrp_script check_edge {
    script  "/etc/keepalived/check-edge.sh"
    interval 1
    timeout  3
    rise     2
    fall     2
    # No `weight` line: a script failure puts the instance into FAULT state,
    # which forces VIP release outright rather than priority adjustment. This
    # matches the "kill the VIP on local-component failure" behavior the
    # Section 7 byte-flow detection needs.
}

vrrp_instance listener {
    state            MASTER          # NODE-SPECIFIC: MASTER on node A, BACKUP on node B
    interface        eth0            # NODE-SPECIFIC: change if your data NIC isn't eth0
    virtual_router_id 51             # MUST match on both nodes; MUST differ from dj instance
    priority         110             # NODE-SPECIFIC: 110 on node A, 100 on node B
    advert_int       1

    # Unicast peering. Multicast VRRP is broken on most clouds & VPS
    # providers; unicast is the supported path per Section 7.
    unicast_src_ip   <node-a-ip>     # NODE-SPECIFIC: this node's IP
    unicast_peer {
        <node-b-ip>                  # NODE-SPECIFIC: the OTHER node's IP
    }

    authentication {
        auth_type PASS
        # CHANGE-ME per region; rotated independently of any other secret.
        # Keepalived truncates >8 chars silently.
        auth_pass listenr01
    }

    virtual_ipaddress {
        <listener-vip>/24 dev eth0      # the listener VIP itself
    }

    track_script {
        check_edge
    }

    notify_master "/etc/keepalived/notify.sh INSTANCE listener MASTER"
    notify_backup "/etc/keepalived/notify.sh INSTANCE listener BACKUP"
    notify_fault  "/etc/keepalived/notify.sh INSTANCE listener FAULT"
}
