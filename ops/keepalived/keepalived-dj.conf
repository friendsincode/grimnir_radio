# keepalived configuration for the DJ-facing VIP.
#
# Holds <dj-vip> (DJ VIP) on whichever HA node passes the `check_fanout`
# health probe with the higher VRRP priority. Both fan-out instances run hot;
# the warm peer mirrors session state via Redis (see Section 2.5 of the
# HA design doc) so a take-over reconstructs in-flight DJ routing without
# re-authentication.
#
# Same template/operator workflow as keepalived-listener.conf. The two
# instances are independent: the listener VIP & the DJ VIP can be held by
# different nodes at the same time without conflict.
#
# Node A (<node-a-ip>): state MASTER, priority 110
# Node B (<node-b-ip>): state BACKUP, priority 100

vrrp_script check_fanout {
    script  "/etc/keepalived/check-fanout.sh"
    interval 1
    timeout  3
    rise     2
    fall     2
}

vrrp_instance dj {
    state            MASTER          # NODE-SPECIFIC
    interface        eth0            # NODE-SPECIFIC
    virtual_router_id 52             # MUST match on both nodes; MUST differ from listener instance (51)
    priority         110             # NODE-SPECIFIC: 110 on node A, 100 on node B
    advert_int       1

    unicast_src_ip   <node-a-ip>     # NODE-SPECIFIC: this node's IP
    unicast_peer {
        <node-b-ip>                  # NODE-SPECIFIC: the OTHER node's IP
    }

    authentication {
        auth_type PASS
        auth_pass djingst1            # CHANGE-ME per region; not the same as listener
    }

    virtual_ipaddress {
        <dj-vip>/24 dev eth0      # the DJ VIP itself; Harbor / WebRTC / RTP / SRT land here
    }

    track_script {
        check_fanout
    }

    notify_master "/etc/keepalived/notify.sh INSTANCE dj MASTER"
    notify_backup "/etc/keepalived/notify.sh INSTANCE dj BACKUP"
    notify_fault  "/etc/keepalived/notify.sh INSTANCE dj FAULT"
}
